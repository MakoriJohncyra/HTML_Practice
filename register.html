<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="bridges-lms.css">
  <title>Register — Bridges LMS</title>
</head>
<body>

<div class="auth-page">

  <!-- Left Panel -->
  <div class="auth-left anim-1">
      <div class="auth-logo">
        <img src="assets/BRIDGESLOGO.png" alt="Bridges LMS Logo" class="auth-logo-img" />
        <div class="auth-logo-text">Bridges <span>LMS</span></div>
      </div>
    <h1 class="auth-tagline">
      Join the<br/><em>Community</em><br/>Today
    </h1>
    <p class="auth-tagline-sub">
      Register as a library member to browse 10,000+ books, track your reading
      goals, and access digital resources from anywhere.
    </p>
    <div class="auth-stats">
      <div class="auth-stat">
        <div class="num">10K+</div>
        <div class="lbl">Books</div>
      </div>
      <div class="auth-stat">
        <div class="num">3,800</div>
        <div class="lbl">Members</div>
      </div>
      <div class="auth-stat">
        <div class="num">24</div>
        <div class="lbl">Genres</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-box anim-2">

      <div class="auth-tabs">
        <a class="auth-tab" href="index.html">Sign In</a>
        <a class="auth-tab active" href="register.html">Register</a>
      </div>

      <h2 class="auth-form-title">Create account</h2>
      <p class="auth-form-sub">Join Bridges LMS as a new member</p>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input class="form-input" placeholder="First name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input class="form-input" placeholder="Last name"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" placeholder="your@email.com"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Member Type</label>
          <select class="form-select">
            <option>Student</option>
            <option>Teacher / Lecturer</option>
            <option>Staff</option>
            <option>External Researcher</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <input class="form-input" placeholder="e.g. Computer Science"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Student / Staff ID</label>
        <input class="form-input" placeholder="e.g. CS/2024/001"/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" placeholder="Min 8 characters"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" placeholder="Repeat password"/>
        </div>
      </div>

      <label class="form-terms">
        <input type="checkbox"/>
        I agree to the <a href="#">Terms of Use</a> and <a href="#">Library Policy</a>
      </label>

      <button type="button" class="btn btn-gold btn-full" onclick="doRegister()">
        Create Account <i class="bi bi-arrow-right" aria-hidden="true"></i>
      </button>

      <p class="auth-switch">
        Already have an account? <a href="index.html">Sign in</a>
      </p>

    </div>
  </div>
</div>

<div id="toast"></div>
<script src="bridges-lms.js"></script>
<script src="register-logic.js"></script>
</body>
</html>
