<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Bridges LMS</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-wrapper">

  <!-- LEFT IMAGE -->
  <div class="auth-left">
    <img src="./assets/BridgesLibraryPhoto1.jpg" alt="Library Image">
    <div class="overlay-text">
      <h2>Welcome to Bridges LMS</h2>
      <p>Every book. Every reader. Every bridge.</p>
    </div>
  </div>

  <div class="auth-right">

    <a href="index.html" class="back-home">← Back</a>

    <h2>Login</h2>
    <p class="subtitle">Access your library account</p>

    <form id="loginForm" action="login.php" method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="Enter email" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>

      <div class="row">
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">Login</button>
    </form>

    <p class="switch">
      Don’t have an account? <a href="signup.html">Sign Up</a>
    </p>

  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
